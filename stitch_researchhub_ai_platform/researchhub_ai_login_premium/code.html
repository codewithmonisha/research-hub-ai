<!-- Micro-interaction Scripts -->
<script>
        // Subtle Mouse parallax for background mesh
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const gradient = `
                radial-gradient(at ${x * 100}% ${y * 100}%, rgba(79, 70, 229, 0.08) 0px, transparent 50%),
                radial-gradient(at ${100 - (x * 100)}% ${100 - (y * 100)}%, rgba(138, 76, 252, 0.08) 0px, transparent 50%)
            `;
            document.body.style.backgroundImage = gradient;
        });

        // Input focus animations
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
